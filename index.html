<html lang="en">

    <title>Agentforce Travel Test Site</title>
    <style>
       
        body {
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 40px;
            background-color: #ffffff;
            color: #141921;
        }

        h2 { font-size: 24px; margin-bottom: 20px; }

        /* The Grid Layout */
        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            max-width: 1100px;
        }

        /* Card Styling */
        .card {
            border: 1px solid #ddd;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .main-card { grid-row: span 2; }

        .side-card {
            display: grid;
            grid-template-columns: 100px 1fr;
            align-items: center;
        }

        /* Image Styling */
        .img-box {
            background-size: cover;
            background-position: center;
            height: 100%;
        }
